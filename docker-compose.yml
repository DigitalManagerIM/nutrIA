version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nutria_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nutria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nutriapass}
      POSTGRES_DB: ${POSTGRES_DB:-nutria_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-nutria}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
