<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 170" fill="none">
  <!-- Body -->
  <ellipse cx="60" cy="115" rx="28" ry="35" fill="#8B6914"/>
  <!-- Lab coat -->
  <ellipse cx="60" cy="112" rx="22" ry="26" fill="white"/>
  <rect x="50" y="90" width="20" height="32" rx="4" fill="white"/>
  <line x1="60" y1="95" x2="60" y2="120" stroke="#e0e0e0" stroke-width="1.5"/>
  <!-- Pocket -->
  <rect x="52" y="108" width="10" height="8" rx="2" fill="#e0e0e0"/>
  <!-- Head -->
  <circle cx="60" cy="66" r="28" fill="#8B6914"/>
  <!-- Ears -->
  <ellipse cx="35" cy="66" rx="7" ry="9" fill="#8B6914"/>
  <ellipse cx="85" cy="66" rx="7" ry="9" fill="#8B6914"/>
  <!-- Glasses -->
  <circle cx="50" cy="67" r="9" fill="none" stroke="#2D3748" stroke-width="2.5"/>
  <circle cx="70" cy="67" r="9" fill="none" stroke="#2D3748" stroke-width="2.5"/>
  <line x1="59" y1="67" x2="61" y2="67" stroke="#2D3748" stroke-width="2.5"/>
  <line x1="32" y1="65" x2="41" y2="66" stroke="#2D3748" stroke-width="2"/>
  <line x1="79" y1="66" x2="88" y2="65" stroke="#2D3748" stroke-width="2"/>
  <!-- Eyes inside glasses -->
  <circle cx="50" cy="68" r="4" fill="#2D3748"/>
  <circle cx="70" cy="68" r="4" fill="#2D3748"/>
  <circle cx="51" cy="66" r="1.5" fill="white"/>
  <circle cx="71" cy="66" r="1.5" fill="white"/>
  <!-- Nose -->
  <ellipse cx="60" cy="77" rx="5" ry="3.5" fill="#5D4037"/>
  <!-- Thoughtful smile -->
  <path d="M53 83 Q60 87 67 83" stroke="#5D4037" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Arm with clipboard -->
  <path d="M32 108 Q20 102 22 90" stroke="#8B6914" stroke-width="10" stroke-linecap="round" fill="none"/>
  <!-- Clipboard -->
  <rect x="6" y="76" width="22" height="28" rx="3" fill="white" stroke="#C49A3C" stroke-width="2"/>
  <rect x="13" y="72" width="8" height="6" rx="2" fill="#C49A3C"/>
  <line x1="10" y1="86" x2="24" y2="86" stroke="#e0e0e0" stroke-width="1.5"/>
  <line x1="10" y1="91" x2="24" y2="91" stroke="#e0e0e0" stroke-width="1.5"/>
  <line x1="10" y1="96" x2="20" y2="96" stroke="#e0e0e0" stroke-width="1.5"/>
  <!-- Other arm -->
  <path d="M88 108 Q100 98 96 88" stroke="#8B6914" stroke-width="10" stroke-linecap="round" fill="none"/>
  <!-- Tail -->
  <path d="M60 148 Q80 158 76 168" stroke="#8B6914" stroke-width="8" stroke-linecap="round" fill="none"/>
  <!-- Legs -->
  <ellipse cx="48" cy="152" rx="10" ry="8" fill="#8B6914"/>
  <ellipse cx="72" cy="152" rx="10" ry="8" fill="#8B6914"/>
</svg>
