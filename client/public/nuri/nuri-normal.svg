  <ellipse cx="60" cy="115" rx="18" ry="24" fill="#C49A3C"/>
  <!-- Head -->
  <circle cx="60" cy="62" r="28" fill="#8B6914"/>
  <!-- Ears -->
  <ellipse cx="36" cy="40" rx="8" ry="10" fill="#8B6914"/>
  <ellipse cx="84" cy="40" rx="8" ry="10" fill="#8B6914"/>
  <ellipse cx="36" cy="40" rx="5" ry="7" fill="#C49A3C"/>
  <ellipse cx="84" cy="40" rx="5" ry="7" fill="#C49A3C"/>
