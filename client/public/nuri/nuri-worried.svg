<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 170" fill="none">
  <!-- Body -->
  <ellipse cx="60" cy="115" rx="28" ry="35" fill="#8B6914"/>
  <ellipse cx="60" cy="118" rx="18" ry="24" fill="#C49A3C"/>
  <!-- Head -->
  <circle cx="60" cy="66" r="28" fill="#8B6914"/>
  <!-- Ears -->
  <ellipse cx="36" cy="44" rx="8" ry="10" fill="#8B6914"/>
  <ellipse cx="84" cy="44" rx="8" ry="10" fill="#8B6914"/>
  <ellipse cx="36" cy="44" rx="5" ry="7" fill="#C49A3C"/>
  <ellipse cx="84" cy="44" rx="5" ry="7" fill="#C49A3C"/>
  <!-- Worried eyebrows -->
  <path d="M44 57 Q50 53 56 57" stroke="#5D4037" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M64 57 Q70 53 76 57" stroke="#5D4037" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Eyes (worried) -->
  <circle cx="50" cy="65" r="7" fill="white"/>
  <circle cx="70" cy="65" r="7" fill="white"/>
  <circle cx="50" cy="66" r="4" fill="#2D3748"/>
  <circle cx="70" cy="66" r="4" fill="#2D3748"/>
  <circle cx="51" cy="64" r="1.5" fill="white"/>
  <circle cx="71" cy="64" r="1.5" fill="white"/>
  <!-- Sweat drop -->
  <ellipse cx="82" cy="55" rx="3" ry="5" fill="#00B4D8" opacity="0.8"/>
  <!-- Nose -->
  <ellipse cx="60" cy="75" rx="5" ry="3.5" fill="#5D4037"/>
  <!-- Worried mouth (biting nail implied) -->
  <path d="M52 82 Q60 79 66 82" stroke="#5D4037" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Hand near mouth (biting nails) -->
  <path d="M32 108 Q28 94 38 84" stroke="#8B6914" stroke-width="10" stroke-linecap="round" fill="none"/>
  <ellipse cx="42" cy="82" rx="9" ry="7" fill="#8B6914"/>
  <!-- Other arm -->
  <path d="M88 110 Q98 100 94 90" stroke="#8B6914" stroke-width="10" stroke-linecap="round" fill="none"/>
  <!-- Tail -->
  <path d="M60 148 Q80 158 76 168" stroke="#8B6914" stroke-width="8" stroke-linecap="round" fill="none"/>
  <!-- Legs -->
  <ellipse cx="48" cy="152" rx="10" ry="8" fill="#8B6914"/>
  <ellipse cx="72" cy="152" rx="10" ry="8" fill="#8B6914"/>
</svg>
